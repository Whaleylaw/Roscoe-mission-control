services:
  - type: web
    name: roscoe-mc-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roscoe-mc-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://llm-lawyer.com,https://www.llm-lawyer.com
      - key: DB_AUTO_MIGRATE
        value: "true"
      - key: AUTH_MODE
        value: local
      - key: LOCAL_AUTH_TOKEN
        generateValue: true
      - key: BASE_URL
        sync: false  # Set after first deploy to: https://roscoe-mc-backend.onrender.com
      - key: RQ_REDIS_URL
        fromService:
          name: roscoe-mc-redis
          type: redis
          property: connectionString
      - key: RQ_QUEUE_NAME
        value: default
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
    plan: starter

  - type: redis
    name: roscoe-mc-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: roscoe-mc-db
    plan: starter
    postgresMajorVersion: "16"
